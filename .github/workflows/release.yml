name: "release"
on:
  push:

permissions:
  contents: read

jobs:
  create-release-artifacts:
    runs-on: ubuntu-24.04
    name: create-release-artifacts
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Dependencies
        run: |
          sudo apt update -qq
          sudo apt install -qqy \
            libdbus-glib-1-dev \
            gettext \
            gir1.2-gst-plugins-base-1.0 \
            gir1.2-gtk-3.0 \
            gir1.2-soup-3.0 \
            gstreamer1.0-plugins-good \
            libcairo2-dev \
            libgirepository-2.0-dev \
            pkg-config \
            pipx \
            xvfb
          pipx install "poetry==2.2.1"
          pipx ensurepath

      - name: Create source dist
        run: |
          poetry install --with docs
          git clean -f
          poetry run ./setup.py distcheck
          cd dist
          gz_name=(quodlibet-*.tar.gz)
          sha256sum "$gz_name" > "$gz_name.sha256"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          path: dist/quodlibet-*
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    name: build-macos
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # - name: Cache jhbuild dependencies
      #   uses: actions/cache@v4
      #   with:
      #     path: |
      #       dev-utils/osx_bundle/_home/jhbuild_checkoutroot/pkgs
      #       dev-utils/osx_bundle/_home/jhbuild_prefix
      #       dev-utils/osx_bundle/_home/.cache/jhbuild/build
      #     key: jhbuild-${{ runner.os }}-${{ hashFiles('dev-utils/osx_bundle/modulesets/quodlibet.modules') }}
      #     restore-keys: |
      #       jhbuild-${{ runner.os }}-

      - name: Bootstrap jhbuild
        run: |
          cd dev-utils/osx_bundle
          ./bootstrap.sh

      - name: Build
        run: |
          cd dev-utils/osx_bundle
          ./build.sh
